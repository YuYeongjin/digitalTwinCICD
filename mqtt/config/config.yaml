apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-config
  namespace: mqtt
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    protocol mqtt
    allow_anonymous true

    listener 9001 0.0.0.0
    protocol websockets
    allow_anonymous true

    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout