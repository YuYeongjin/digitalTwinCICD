apiVersion: v1
kind: Namespace
metadata:
  name: mqtt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-config
  namespace: mqtt
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    listener 9001
    protocol websockets
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
