apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: twinspring
data:
  # Ollama
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  LLM_MODEL: "qwen2.5:14b"
  # PostgreSQL (pgvector - vector store)
  VECTOR_DB_HOST: "postgresql-service"
  VECTOR_DB_PORT: "5432"
  VECTOR_DB_NAME: "digital_twin"
  VECTOR_DB_USER: "postgres"
  VECTOR_DB_PASSWORD: "Abcd1234"
  # InfluxDB (IoT 시계열 데이터 조회)
  INFLUX_URL: "http://influxdb-service:8086"
  INFLUX_TOKEN: "twinspring-influx-admin-token"
  INFLUX_ORG: "twinspring"
  INFLUX_BUCKET: "iot_data"
  # Spring API
  SPRING_BASE_URL: "http://spring-service:8080"
