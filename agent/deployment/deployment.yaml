apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: twin-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
        - name: agent
          image: yeongjin95/twin-agent:40
          ports:
            - containerPort: 7070

          env:
            - name: HF_HOME
              value: /app/.cache/huggingface

          envFrom:
            - configMapRef:
                name: agent-config

          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi

          volumeMounts:
            - name: hf-model-cache
              mountPath: /app/.cache/huggingface

          readinessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 40
            periodSeconds: 20

      volumes:
        - name: hf-model-cache
          hostPath:
            path: /var/hf_cache
            type: DirectoryOrCreate