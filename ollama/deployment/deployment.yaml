apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: twinspring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        # 컨테이너 시작 후 qwen2.5:14b 모델 자동 pull (이미 있으면 스킵)
        command: ["/bin/sh", "-c"]
        args:
        - |
          ollama serve &
          OLLAMA_PID=$!
          until ollama list > /dev/null 2>&1; do sleep 2; done
          ollama pull qwen2.5:14b
          wait $OLLAMA_PID
        ports:
        - containerPort: 11434
        envFrom:
        - configMapRef:
            name: ollama-config
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 15
          # 모델 다운로드 시간을 고려해 failureThreshold를 높게 설정
          failureThreshold: 40
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: ollama-data
        hostPath:
          path: /data/ollama
          type: DirectoryOrCreate
