apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          ollama serve &
          OLLAMA_PID=$!
          until ollama list > /dev/null 2>&1; do sleep 2; done
          ollama pull qwen3:4b         
          ollama pull llama3.2:1b      
          printf 'FROM qwen3:4b\nPARAMETER think false\n' > /tmp/Modelfile
          ollama create twinspring-llm -f /tmp/Modelfile
          wait $OLLAMA_PID
        ports:
        - containerPort: 11434
        envFrom:
        - configMapRef:
            name: ollama-config
        env:
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_KEEP_ALIVE   
          value: "5m"
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
        resources:
          requests:
            cpu: "2"
            memory: 8Gi         
          limits:
            cpu: "4"
            memory: 16Gi
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60   
          periodSeconds: 15
          failureThreshold: 40
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 120   
          periodSeconds: 30
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc
