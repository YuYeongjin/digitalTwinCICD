apiVersion: v1
kind: Namespace
metadata:
  name: jenkins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      initContainers:
      - name: kubectl-installer
        image: bitnami/kubectl:latest
        command: ['cp', '/opt/bitnami/kubectl/bin/kubectl', '/kubectl-bin/kubectl']
        volumeMounts:
        - name: kubectl-bin
          mountPath: /kubectl-bin
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts
        ports:
        - containerPort: 8080
        - containerPort: 50000
        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        - name: kubectl-bin
          mountPath: /usr/local/bin/kubectl
          subPath: kubectl
      volumes:
      - name: jenkins-home
        hostPath:
          path: /data/jenkins
          type: DirectoryOrCreate
      - name: kubectl-bin
        emptyDir: {}
