apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring
  namespace: twin-spring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring
  template:
    metadata:
      labels:
        app: spring
    spec:
      containers:
      - name: spring
        image: yeongjin95/twin-spring:159
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: spring-config
        env:
          - name: OPENWEATHER_API_KEY
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: weather-key
          - name: SPRING_DATASOURCE_USERNAME
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: db-user
          - name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: db-password
          - name: TOTP_SETUP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: totp-setup-password
          - name: STORAGE_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: storage-access-key
          - name: STORAGE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: spring-credentials
                key: storage-secret-key
        volumeMounts:
          - name: host-proc
            mountPath: /host/proc
            readOnly: true
          - name: host-root
            mountPath: /host-root
            readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
