# ══════════════════════════════════════════════════════════════
#  nginx-ingress 컨트롤러 전역 설정
#
#  ※ ingress.yaml의 configuration-snippet annotation을 사용하려면
#    nginx-ingress >= 1.0 에서 allow-snippet-annotations 를 활성화해야 함
#
#  적용 순서:
#    1. kubectl apply -f spring/ingress/nginx-config.yaml   ← 먼저 적용
#    2. kubectl apply -f spring/ingress/ingress.yaml
#
#  또는 명령줄로 즉시 적용:
#    kubectl -n ingress-nginx patch configmap ingress-nginx-controller \
#      --type merge -p '{"data":{"allow-snippet-annotations":"true"}}'
# ══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  # ── Snippet annotation 허용 ────────────────────────────────
  # WebSocket(STOMP) 헤더 전달용 configuration-snippet 사용에 필요
  allow-snippet-annotations: "true"

  # ── HTTP 버전 ──────────────────────────────────────────────
  # WebSocket 연결을 위해 HTTP/1.1 사용
  proxy-http-version: "1.1"

  # ── 전역 타임아웃 기본값 ────────────────────────────────────
  # Ingress annotation이 없는 경로에 적용되는 fallback
  # 504 방지: AI Agent LLM 응답 / IFC 파싱 등 long-running 요청 대비
  proxy-read-timeout: "300"       # 5분 (개별 Ingress에서 3600으로 override됨)
  proxy-send-timeout: "300"
  proxy-connect-timeout: "10"     # 연결 실패는 10초 내 빠르게 감지

  # ── Upstream Keepalive ─────────────────────────────────────
  # 없으면 요청마다 새 TCP 연결 → 연결 지연 → 504 위험
  upstream-keepalive-connections: "32"
  upstream-keepalive-time: "1h"
  upstream-keepalive-timeout: "60"
  upstream-keepalive-requests: "10000"

  # ── 클라이언트 Keepalive ────────────────────────────────────
  keep-alive: "75"
  keep-alive-requests: "1000"

  # ── 에러 처리 ───────────────────────────────────────────────
  # single-pod 환경에서 무의미한 재시도 방지
  proxy-next-upstream: "error timeout non_idempotent"
  proxy-next-upstream-tries: "1"
