apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twin-ingress
  namespace: twin-spring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    #    cert-manager.io/cluster-issuer: "letsencrypt-duckdns"
    #    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # ── 504 방지: 타임아웃 설정 ────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"    # 1시간 — LLM 장기 응답 대비
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"   # upstream 연결 실패는 빠르게 감지

    # ── ⚡ [수정] 502 방지: 대용량 응답 버퍼 확장 ────────────────
    # 기존 16k는 물리 연산/BIM 대용량 JSON 데이터를 담지 못해 502를 유발함
    # 첫 버퍼 크기를 128k로 늘리고, 청크 버퍼를 4개 블록 총 1024k(1MB)까지 넉넉하게 확보
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-buffers-size: "256k"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"

    # ── 504 방지: single-pod 재시도 비활성화 ──────────────────
    nginx.ingress.kubernetes.io/proxy-next-upstream: "off"

    # ── IFC / 이미지 업로드 크기 허용 ─────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yjtwin.duckdns.org
      secretName: yjtwin-tls-secret
  rules:
    - host: yjtwin.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-service
                port:
                  number: 8080